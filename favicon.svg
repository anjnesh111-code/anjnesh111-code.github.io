<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="ring" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a855f7" />
      <stop offset="1" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="letters" x1="18" y1="20" x2="46" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d8b4fe" />
      <stop offset="1" stop-color="#7dd3fc" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="#080b18" />
  <rect x="3.5" y="3.5" width="57" height="57" rx="11" stroke="url(#ring)" stroke-opacity="0.65" />
  <circle cx="32" cy="32" r="25" stroke="url(#ring)" stroke-width="2.2" filter="url(#glow)" />
  <text
    x="32"
    y="39"
    text-anchor="middle"
    font-family="Segoe UI, Inter, Arial, sans-serif"
    font-weight="700"
    font-size="22"
    letter-spacing="0.8"
    fill="url(#letters)"
    filter="url(#glow)"
  >
    AS
  </text>
</svg>
